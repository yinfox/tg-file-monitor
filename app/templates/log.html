{% extends "base.html" %}

{% block title %}Telegram 监控日志{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Telegram 监控日志</h2>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="autoRefreshToggle" checked>
                <label class="form-check-label" for="autoRefreshToggle">
                    <i class="bi bi-arrow-clockwise"></i> 实时刷新 (<span id="refreshCountdown">3</span>s)
                </label>
            </div>
        </div>
        <div class="card p-3 shadow-sm" style="max-height: 70vh; overflow-y: auto;" id="logContainer">
            <pre class="mb-0" id="logContent">{{ log_output|safe }}</pre>
        </div>
        <p class="mt-3 text-center">
            <a href="{{ url_for('download_monitor_log') }}" class="btn btn-primary me-2">下载日志</a>
            <form action="{{ url_for('clear_monitor_log') }}" method="post" class="d-inline-block">
                <button type="submit" class="btn btn-warning me-2">清除日志</button>
            </form>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">返回主页</a>
        </p>
    </div>
</div>

<script>
let autoRefresh = true;
let countdown = 3;
let intervalId = null;
let countdownId = null;

const logContainer = document.getElementById('logContainer');
const logContent = document.getElementById('logContent');
const autoRefreshToggle = document.getElementById('autoRefreshToggle');
const refreshCountdown = document.getElementById('refreshCountdown');

function scrollToBottom() {
    logContainer.scrollTop = logContainer.scrollHeight;
}

function refreshLog() {
    fetch(window.location.href)
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const newContent = doc.getElementById('logContent');
            if (newContent) {
                logContent.innerHTML = newContent.innerHTML;
                scrollToBottom();
            }
        })
        .catch(error => console.error('日志刷新失败:', error));
}

function updateCountdown() {
    countdown--;
    if (countdown <= 0) {
        countdown = 3;
        if (autoRefresh) {
            refreshLog();
        }
    }
    refreshCountdown.textContent = countdown;
}

autoRefreshToggle.addEventListener('change', function() {
    autoRefresh = this.checked;
    if (!autoRefresh) {
        if (intervalId) clearInterval(intervalId);
        if (countdownId) clearInterval(countdownId);
        refreshCountdown.textContent = '--';
    } else {
        countdown = 3;
        startAutoRefresh();
    }
});

function startAutoRefresh() {
    countdownId = setInterval(updateCountdown, 1000);
}

// 初始滚动到底部
scrollToBottom();

// 启动自动刷新
startAutoRefresh();
</script>
{% endblock %}
