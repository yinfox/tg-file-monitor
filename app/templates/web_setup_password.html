{% extends "base.html" %}

{% block title %}设置管理员密码{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h2 class="mb-4 text-center">设置管理员密码</h2>
        <div class="card p-4 shadow-sm">
            <p class="text-center">这是您首次访问管理界面，请设置管理员密码。</p>
            <form method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名:</label>
                    <input type="text" id="username" name="username" class="form-control" value="{{ username }}" readonly>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码:</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">设置密码</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
