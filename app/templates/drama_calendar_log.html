{% extends "base.html" %}

{% block title %}追剧日志{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">追剧日志</h2>
            <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="autoRefreshToggle" {% if auto_refresh %}checked{% endif %}>
            <label class="form-check-label" for="autoRefreshToggle">
                <i class="bi bi-arrow-clockwise"></i> 实时刷新 (<span id="refreshCountdown">{{ refresh_interval }}</span>s)
            </label>
        </div>
        </div>
        <div class="card p-3 shadow-sm" style="max-height: 70vh; overflow-y: auto;" id="logContainer">
            <pre class="mb-0" id="logContent">{{ log_output|safe }}</pre>
        </div>
        <p class="mt-3 text-center">
            <a href="{{ url_for('download_drama_calendar_log') }}" class="btn btn-primary me-2">下载日志</a>
            <form action="{{ url_for('clear_drama_calendar_log') }}" method="post" class="d-inline-block">
                <button type="submit" class="btn btn-warning me-2">清除日志</button>
            </form>
            <a href="{{ url_for('drama_calendar_settings') }}" class="btn btn-secondary">返回追剧配置</a>
        </p>
    </div>
</div>

<script>
const refreshInterval = {{ refresh_interval|default(5) }};
let autoRefresh = {{ 'true' if auto_refresh else 'false' }};
let countdown = refreshInterval;
let countdownId = null;
let lastKey = "";

const logContainer = document.getElementById('logContainer');
const logContent = document.getElementById('logContent');
const autoRefreshToggle = document.getElementById('autoRefreshToggle');
const refreshCountdown = document.getElementById('refreshCountdown');

function scrollToBottom() {
    logContainer.scrollTop = logContainer.scrollHeight;
}

function refreshLog() {
    const url = new URL("{{ url_for('drama_calendar_log_data') }}", window.location.origin);
    if (lastKey) {
        url.searchParams.set('last_key', lastKey);
    }
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data && data.key) {
                lastKey = data.key;
            }
            if (data && data.changed && typeof data.log_output === 'string') {
                logContent.innerHTML = data.log_output;
                scrollToBottom();
            }
        })
        .catch(error => console.error('日志刷新失败:', error));
}

function updateCountdown() {
    countdown--;
    if (countdown <= 0) {
        countdown = refreshInterval;
        if (autoRefresh) {
            refreshLog();
        }
    }
    refreshCountdown.textContent = countdown;
}

autoRefreshToggle.addEventListener('change', function() {
    autoRefresh = this.checked;
    if (!autoRefresh) {
        if (countdownId) clearInterval(countdownId);
        refreshCountdown.textContent = '--';
    } else {
        countdown = refreshInterval;
        refreshCountdown.textContent = countdown;
        startAutoRefresh();
    }
});

function startAutoRefresh() {
    countdownId = setInterval(updateCountdown, 1000);
}

scrollToBottom();
if (autoRefresh) {
    startAutoRefresh();
} else {
    refreshCountdown.textContent = '--';
}
</script>
{% endblock %}
